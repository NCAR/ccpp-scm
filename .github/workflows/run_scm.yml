name: Build/run the CCPP-SCM, compare to baselines

on:
  push:
    branches:
      - feature/containerized_ci
  pull_request:
  workflow_dispatch:

jobs:
  scm_in_container:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        fortran-compiler: [ifx, gfortran]#, nvfortran]
        build-type:       [Release, Debug]
        sdfs:             [supported, legdev]
        include:
        # Set container images for each compiler
        - fortran-compiler: ifx
          image: dustinswales/ccpp-scm-ci:oneapi
        - fortran-compiler: gfortran
          image: dustinswales/ccpp-scm-ci:gnu
#        - fortran-compiler: nvfortran
#          image: dustinswales/ccpp-scm-ci:nvhpc
    container:
      image: ${{ matrix.image }}
    # Environmental variables
    env:
      SCM_ROOT:  /__w/ccpp-scm/ccpp-scm
      sdfs_supported:    SCM_GFS_v16,SCM_GFS_v16_RRTMGP,SCM_GFS_v17_p8_ugwpv1,SCM_WoFS_v0,SCM_HRRR_gf
      sdfs_supported_ps: SCM_GFS_v16_ps,SCM_GFS_v16_RRTMGP_ps,SCM_GFS_v17_p8_ugwpv1_ps,SCM_WoFS_v0_ps,SCM_HRRR_gf_ps
      sdfs_legdev:       SCM_GFS_v16_no_nsst,SCM_GFS_v17_p8_ugwpv1_no_nsst,SCM_RRFS_v1beta_no_nsst,SCM_GFS_v17_p8,SCM_HRRR,SCM_RRFS_v1beta,SCM_RAP,SCM_GFS_v15p2,SCM_GFS_v16_gfdlmpv3,SCM_GFS_v15p2_ntiedtke,SCM_GFS_v16_debug
      sdfs_legdev_ps:    SCM_GFS_v16_no_nsst_ps,SCM_GFS_v17_p8_ugwpv1_no_nsst_ps,SCM_RRFS_v1beta_no_nsst_ps,SCM_GFS_v17_p8_ps,SCM_HRRR_ps,SCM_RRFS_v1beta_ps,SCM_RAP_ps,SCM_GFS_v15p2_ps,SCM_GFS_v16_gfdlmpv3_ps,SCM_GFS_v15p2_ntiedtke_ps,SCM_GFS_v16_debug_ps
      dir_rt:    /__w/ccpp-scm/ccpp-scm/test/artifact-${{matrix.build-type}}
      dir_bl:    /__w/ccpp-scm/ccpp-scm/test/BL-${{matrix.build-type}}
      artifact_origin: ${{ github.event_name == 'pull_request' && 'PR' || ('feature/containerized_ci' == 'feature/containerized_ci' && 'feature/containerized_ci' || 'PR') }}
      GH_TOKEN:   ${{ github.token }}

    # Workflow steps
    steps:
    #######################################################################################
    # Initial
    #######################################################################################
    - name: Checkout SCM code (/__w/ccpp-scm/ccpp-scm)
      uses: actions/checkout@v4

    - name: Install Required Tools
      run: |
        apt-get update

    - name: Initialize Submodules
      run: |
        git config --global --add safe.directory ${SCM_ROOT}
        cd ${SCM_ROOT}
        git submodule update --init --recursive

    - name: Setup MPI (GNU)
      if: matrix.fortran-compiler == 'gfortran'
      run: |
        echo "MPI_COMM=mpirun --allow-run-as-root -np 1" >> $GITHUB_ENV
        echo "CC=mpicc"   >> $GITHUB_ENV
        echo "CXX=mpicxx" >> $GITHUB_ENV
        echo "FC=mpif90"  >> $GITHUB_ENV

    - name: Setup MPI (Intel OneAPI)
      if: matrix.fortran-compiler == 'ifx'
      run: |
        echo "PATH=/opt/intel/oneapi/mpi/latest/bin:${PATH}" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=/opt/intel/oneapi/mpi/latest/lib:${LD_LIBRARY_PATH}" >> $GITHUB_ENV
        echo "MPI_COMM=mpirun -np 1" >> $GITHUB_ENV
        echo "CC=mpiicx"   >> $GITHUB_ENV
        echo "CXX=mpiicpx" >> $GITHUB_ENV
        echo "FC=mpiifx"   >> $GITHUB_ENV

    - name: Setup MPI (Nvidia)
      if: matrix.fortran-compiler == 'nvfortran'
      run: |
        echo "MPI_COMM=mpirun --allow-run-as-root -np 1" >> $GITHUB_ENV
        echo "CC=mpicc"   >> $GITHUB_ENV
        echo "CXX=mpic++" >> $GITHUB_ENV
        echo "FC=mpifort" >> $GITHUB_ENV

    - name: Verify MPI installation
      run: |
        source test/verify-mpi.sh ${{matrix.fortran-compiler}}
      shell: bash

    #######################################################################################
    # Build SCM.
    #######################################################################################
    - name: Download data for SCM
      run: |
        cd ${SCM_ROOT}
        ./contrib/get_all_static_data.sh
        ./contrib/get_thompson_tables.sh
        ./contrib/get_tempo_data.sh
        ./contrib/get_aerosol_climo.sh
        ./contrib/get_rrtmgp_data.sh

    - name: Configure SCM SDFs before building model (supported SCM cases/sdfs)
      if: matrix.sdfs == 'supported'
      run: |
        echo "suites=${sdfs_supported}"       >> "$GITHUB_ENV"
        echo "suites_ps=${sdfs_supported_ps}" >> "$GITHUB_ENV"

    - name: Configure SCM SDFs before building model (legacy/developmental SCM cases/sdfs)
      if: matrix.sdfs == 'legdev'
      run: |
        echo "suites=${sdfs_legdev}"       >> "$GITHUB_ENV"
        echo "suites_ps=${sdfs_legdev_ps}" >> "$GITHUB_ENV"

    - name: Configure Build with CMake
      run: |
        cd ${SCM_ROOT}/scm
        mkdir bin && cd bin
        cmake -DCCPP_SUITES=${suites},${suites_ps} -DCMAKE_BUILD_TYPE=${{matrix.build-type}} ../src

    - name: Build SCM
      run: |
        cd ${SCM_ROOT}/scm/bin
        make -j4

    #######################################################################################
    # Run regression tests.
    #######################################################################################
    - name: Run SCM RTs
      if: matrix.build-type != 'SinglePrecision'
      run: |
        cd ${SCM_ROOT}/scm/bin
        ./run_scm.py --file /__w/ccpp-scm/ccpp-scm/test/rt_test_cases_${{matrix.sdfs}}.py --runtime_mult 0.1 --mpi_command "${MPI_COMM}"

    - name: Run SCM Single Precision RTs
      if: matrix.build-type == 'SinglePrecision'
      run: |
        cd ${SCM_ROOT}/scm/bin
        ./run_scm.py --file /__w/ccpp-scm/ccpp-scm/test/rt_test_cases_sp.py --runtime_mult 0.1 -v --mpi_command "$(MPI_COMM}"

    - name: Gather SCM RT output
      run: |
        cd ${SCM_ROOT}/test
        mkdir /__w/ccpp-scm/ccpp-scm/test/artifact-${{matrix.build-type}}-${{matrix.fortran-compiler}}-${{matrix.sdfs}}
        ./ci_util.py -b ${{matrix.build-type}}-${{matrix.fortran-compiler}}-${{matrix.sdfs}} -s ${{matrix.sdfs}}

    - name: Save Artifact Id Numbers and Create Directory for SCM RT baselines
      run: |
        mkdir -p ${dir_bl}
        ARTIFACT_ID=$(gh api --paginate \
        repos/dustinswales/ccpp-scm/actions/artifacts | \
        jq -s '[ .[] | .artifacts[] | select(.name == "rt-baselines-${{matrix.build-type}}-${{matrix.fortran-compiler}}-${{matrix.sdfs}}" and (.expired | not))] | sort_by(.created_at) | last | .workflow_run | .id ')
        echo "artifact_id=${ARTIFACT_ID}"
        echo "artifact_id=${ARTIFACT_ID}" >> "$GITHUB_ENV"

    - name: Download SCM RT baselines
      uses: actions/download-artifact@v6
      with:
        name: rt-baselines-${{matrix.build-type}}-${{matrix.fortran-compiler}}-${{matrix.sdfs}}
        path: ${{ env.dir_bl }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        run-id: ${{ env.artifact_id }}

    - name: Compare SCM RT output to baselines
      run: |
        cd ${SCM_ROOT}/test
        ./cmp_rt2bl.py --dir_rt ${dir_rt} --dir_bl ${dir_bl} --sdfs ${{matrix.sdfs}}

    - name: Check if SCM RT plots exist
      id: check_files
      run: |
        if [ -n "$(ls -A /__w/ccpp-scm/ccpp-scm/test/scm_rt_out 2>/dev/null)" ]; then
          echo "files_exist=true" >> "$GITHUB_ENV"
        else
          echo "files_exist=false" >> "$GITHUB_ENV"
        fi

    - name: Upload plots of SCM Baselines/RTs as GitHub Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rt-plots-${{matrix.build-type}}-${{matrix.fortran-compiler}}-${{matrix.sdfs}}
        path: /__w/ccpp-scm/ccpp-scm/test/scm_rt_out

    - name: Upload SCM RTs as GitHub Artifact
      uses: actions/upload-artifact@v5
      with:
        name: rt-baselines-${{matrix.build-type}}-${{matrix.fortran-compiler}}-${{matrix.sdfs}}
        path: /__w/ccpp-scm/ccpp-scm/test/artifact-${{matrix.build-type}}-${{matrix.fortran-compiler}}-${{matrix.sdfs}}