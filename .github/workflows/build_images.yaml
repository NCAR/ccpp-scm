name: CCPP SCM Base Images Build
run-name: CI Image Build for CCPP SCM

on: [push]

jobs:
  docker:
    strategy:
      fail-fast: false  # Disable fail-fast
      matrix:
        toolchain:  [oneapi,gnu,nvhpc]
        include:
          # Set toolchain configuration(s)
          - toolchain: oneapi
            nfversion: 4.5.4
            pnfversion: 1.12.3
            OMPI:
            FC:  ifx
            CC:  icx
            CXX: icpx
            PFC: mpiifort
            PCC: mpiicc
          - toolchain: gnu
            nfversion: 4.6.2
            pnfversion: 1.14.1
            OMPI:
            FC:  gfortran
            CC:  gcc
            CXX: g++
            PFC: gfortran
            PCC: gcc
          - toolchain: nvhpc
            nfversion: 4.5.4
            pnfversion: 1.12.3
            OMPI:
            FC:  nvfortran
            CC:  nvc
            CXX: nvc++
            PFC: nvfortran
            PCC: nvc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Where are things
        run: !
          where mpiicc

      - name: Build minimal-toolchain:${{ matrix.toolchain }}
        uses: docker/build-push-action@v6
        with:
          file: docker/Dockerfile-${{ matrix.toolchain }}-minimal
          tags: minimal-toolchain:${{ matrix.toolchain }}

      - name: Build add-netcdf:${{ matrix.toolchain }}
        uses: docker/build-push-action@v6
        with:
          file: docker/Dockerfile-add-netcdf
          tags: add-netcdf:${{ matrix.toolchain }}
          build-args: |
            TOOLCHAIN=${{ matrix.toolchain }}
            NFVERSION=${{ matrix.nfversion }}
            FC=${{ matrix.FC }}
            CC=${{ matrix.CC }}
            CXX=${{ matrix.CXX }}

      - name: Build add-pnetcdf:${{ matrix.toolchain }}
        uses: docker/build-push-action@v6
        with:
          file: docker/Dockerfile-add-pnetcdf
          tags: add-pnetcdf:${{ matrix.toolchain }}
          build-args: |
            TOOLCHAIN=${{ matrix.toolchain }}
            PNFVERSION=${{ matrix.pnfversion }}
            FC=${{ matrix.PFC }}
            CC=${{ matrix.PCC }}

      - name: Build add-nceplibs:${{ matrix.toolchain }}
        uses: docker/build-push-action@v6
        with:
          file: docker/Dockerfile-add-nceplibs
          build-args: TOOLCHAIN=${{ matrix.toolchain }}
          tags: add-nceplibs:${{ matrix.toolchain }}

      - name: Build add-python:${{ matrix.toolchain }}
        uses: docker/build-push-action@v6
        with:
          file: docker/Dockerfile-add-python
          build-args: TOOLCHAIN=${{ matrix.toolchain }}
          tags: add-python:${{ matrix.toolchain }}

      - name: Log in to DockerHub
        if: ${{ github.ref == 'refs/heads/feature/containerized_ci' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push ccpp-scm-ci:${{ matrix.toolchain }}
        uses: docker/build-push-action@v6
        with:
          file: docker/Dockerfile-finalize
          build-args: TOOLCHAIN=${{ matrix.toolchain }}
          push: ${{ github.ref == 'refs/heads/feature/containerized_ci' }}
          tags: |
            dustinswales/ccpp-scm-ci:${{ matrix.toolchain }}
