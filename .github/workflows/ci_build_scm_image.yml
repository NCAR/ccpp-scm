name: Build and run the CCPP-SCM in a container

on:
  push:
    branches:
      - feature/containerized_ci
  pull_request:
  workflow_dispatch:

jobs:
  scm_in_container:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        fortran-compiler: [ifx, gfortran, nvfortran]
        build-type:       [Release, Debug]
        include:
        # Set container images for each compiler
        - fortran-compiler: ifx
          image: dustinswales/ccpp-scm-ci:oneapi
        - fortran-compiler: gfortran
          image: dustinswales/ccpp-scm-ci:gnu
        - fortran-compiler: nvfortran
          image: dustinswales/ccpp-scm-ci:nvhpc
    container:
      image: ${{ matrix.image }}
      env:
        I_MPI_HYDRA_ALLOW_ROOT: 1
    # Environmental variables
    env:
      SCM_ROOT:  /__w/ccpp-scm/ccpp-scm
      NFHOME:    /usr
      #suites:    SCM_GFS_v15p2,SCM_GFS_v16,SCM_HRRR,SCM_RRFS_v1beta,SCM_RAP,SCM_WoFS_v0,SCM_HRRR_gf,SCM_GFS_v17_p8_ugwpv1,SCM_GFS_v16_RRTMGP
      #suites_ps: SCM_GFS_v15p2_ps,SCM_GFS_v16_ps,SCM_HRRR_ps,SCM_RRFS_v1beta_ps,SCM_RAP_ps,SCM_WoFS_v0_ps,SCM_HRRR_gf_ps,SCM_GFS_v17_p8_ugwpv1_ps,SCM_GFS_v16_RRTMGP_ps
      suites:    SCM_GFS_v16
      suites_ps: SCM_GFS_v16_ps
      dir_rt:    /__w/ccpp-scm/ccpp-scm/test/artifact-${{matrix.build-type}}
      dir_bl:    /__w/ccpp-scm/ccpp-scm/test/BL-${{matrix.build-type}}
      I_MPI_HYDRA_ALLOW_ROOT: 1

    # Workflow steps
    steps:
    #######################################################################################
    # Initial
    #######################################################################################
    - name: Checkout SCM code (/__w/ccpp-scm/ccpp-scm)
      uses: actions/checkout@v4

    - name: Install Required Tools
      run: |
        apt-get update

    - name: Initialize Submodules
      run: |
        git config --global --add safe.directory ${SCM_ROOT}
        cd ${SCM_ROOT}
        git submodule update --init --recursive

    - name: Setup MPI (GNU)
      if: matrix.fortran-compiler == 'gfortran'
      run: |
        echo "MPI_COMM=mpirun --allow-run-as-root -np 1" >> $GITHUB_ENV

#    - name: Verify MPI installation (GNU)
#      if: matrix.fortran-compiler == 'gfortran'
#      run: bash test/verify-mpi.sh gfortran

    - name: setvars
      if: matrix.fortran-compiler == 'ifx'
      run: |
        source /opt/intel/oneapi/setvars.sh
      shell: bash

    - name: Setup MPI (Intel OneAPI)
      if: matrix.fortran-compiler == 'ifx'
      run: |
        echo "PATH=/opt/intel/oneapi/mpi/latest/bin:${PATH}" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=/opt/intel/oneapi/mpi/latest/lib:${LD_LIBRARY_PATH}" >> $GITHUB_ENV
        echo "I_MPI_HYDRA_ALLOW_ROOT=1" >> $GITHUB_ENV
        echo "MPI_COMM=mpirun -np 1" >> $GITHUB_ENV

    - name: Verify MPI installation
      run: |
        source test/verify-mpi.sh ${{matrix.fortran-compiler}}
      shell: bash

    #######################################################################################
    # Build SCM.
    #######################################################################################
    - name: Download data for SCM
      run: |
        cd ${SCM_ROOT}
        ./contrib/get_all_static_data.sh
#        ./contrib/get_thompson_tables.sh
#        ./contrib/get_aerosol_climo.sh

    - name: Configure Build with CMake
      run: |
        cd ${SCM_ROOT}/scm
        mkdir bin && cd bin
        cmake -DCCPP_SUITES=${suites},${suites_ps} -DCMAKE_BUILD_TYPE=${{matrix.build-type}} ../src

    - name: Build SCM
      run: |
        cd ${SCM_ROOT}/scm/bin
        make -j4

    #######################################################################################
    # Run regression tests.
    #######################################################################################
    - name: Run SCM RTs
      if: matrix.build-type != 'SinglePrecision'
      run: |
        cd ${SCM_ROOT}/scm/bin
        ./run_scm.py --file /__w/ccpp-scm/ccpp-scm/test/rt_test_cases.py --runtime_mult 0.1 --mpi_command "${MPI_COMM}"

    - name: Run SCM Single Precision RTs
      if: matrix.build-type == 'SinglePrecision'
      run: |
        cd ${SCM_ROOT}/scm/bin
        ./run_scm.py --file /__w/ccpp-scm/ccpp-scm/test/rt_test_cases_sp.py --runtime_mult 0.1 -v --mpi_command "$(MPI_COMM}"

    - name: Gather SCM RT output
      run: |
        cd ${SCM_ROOT}/test
        mkdir /__w/ccpp-scm/ccpp-scm/test/artifact-${{matrix.build-type}}-${{matrix.fortran-compiler}}
        ./ci_util.py -b ${{matrix.build-type}}-${{matrix.fortran-compiler}}

    - name: Create directory for SCM RT baselines
      run: mkdir ${dir_bl}

#    - name: Download SCM RT baselines
#      run: |
#        cd ${dir_bl}
#        wget https://dtcenter.ucar.edu/ccpp/rt/rt-baselines-${{matrix.build-type}}-${{matrix.fortran-compiler}}.zip
#        unzip rt-baselines-${{matrix.build-type}}-${{matrix.fortran-compiler}}.zip

#    - name: Compare SCM RT output to baselines
#      run: |
#        cd ${SCM_ROOT}/test
#        ./cmp_rt2bl.py --dir_rt ${dir_rt} --dir_bl ${dir_bl}

#    - name: Upload plots of SCM Baselines/RTs as GitHub Artifact
#      uses: actions/upload-artifact@v4
#      with:
#        name: rt-plots-${{matrix.build-type}}-${{matrix.fortran-compiler}}
#        path: /__w/ccpp-scm/ccpp-scm/test/scm_rt_out

    - name: Upload SCM RTs as GitHub Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rt-baselines-${{matrix.build-type}}-${{matrix.fortran-compiler}}
        path: /__w/ccpp-scm/ccpp-scm/test/artifact-${{matrix.build-type}}-${{matrix.fortran-compiler}}