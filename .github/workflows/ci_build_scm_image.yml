name: Build the CCPP-SCM in a container

on:
  push:
    branches:
      - feature/containerized_ci
  pull_request:
  workflow_dispatch:

jobs:
  build_scm_container:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        fortran-compiler: [ifx]
        build-type:       [Release, Debug]
        include:
        # Set container images
        - fortran-compiler: ifx
          image: dustinswales/ccpp-scm-ci:oneapi
    container:
      image: ${{ matrix.image }} 
    # Environmental variables
    env:
      oneapi_version: 2025.3
      FC:       ${{ matrix.fortran-compiler }}
      NetCDF_Fortran_ROOT: /opt/netcdf-fortran
      SCM_ROOT: /__w/ccpp-scm/ccpp-scm
      suites:     SCM_GFS_v15p2,SCM_GFS_v15p2_ntiedtke,SCM_GFS_v16,SCM_GFS_v17_p8,SCM_HRRR,SCM_RRFS_v1beta,SCM_RAP,SCM_WoFS_v0,SCM_HRRR_gf,SCM_GFS_v17_p8_ugwpv1,SCM_GFS_v16_RRTMGP,SCM_GFS_v16_debug,SCM_GFS_v16_no_nsst,SCM_GFS_v17_p8_ugwpv1_no_nsst,SCM_RRFS_v1beta_no_nsst,SCM_GFS_v16_gfdlmpv3,SCM_GFS_v17_p8_ugwpv1_tempo
      suites_ps:  SCM_GFS_v15p2_ps,SCM_GFS_v15p2_ntiedtke_ps,SCM_GFS_v16_ps,SCM_GFS_v17_p8_ps,SCM_HRRR_ps,SCM_RRFS_v1beta_ps,SCM_RAP_ps,SCM_WoFS_v0_ps,SCM_HRRR_gf_ps,SCM_GFS_v17_p8_ugwpv1_ps,SCM_GFS_v16_RRTMGP_ps,SCM_GFS_v16_debug_ps,SCM_GFS_v16_no_nsst_ps,SCM_GFS_v17_p8_ugwpv1_no_nsst_ps,SCM_RRFS_v1beta_no_nsst_ps,SCM_GFS_v16_gfdlmpv3_ps,SCM_GFS_v17_p8_ugwpv1_tempo_ps

    # Workflow steps
    steps:
    #############################################################
    # NOTE
    # $ echo ${{ github.workspace }}
    # /home/runner/work/<REPO_NAME>/<REPO_NAME>
    # $ echo $GITHUB_WORKSPACE
    # /__w/<REPO_NAME>/<REPO_NAME>
    #############################################################
    - name: Checkout SCM code (/__w/ccpp-scm/ccpp-scm)
      uses: actions/checkout@v4

    - name: Install Required Tools
      run: |
        apt-get update
        #apt-get install -y openmpi-bin libopenmpi-dev

    - name: Initialize Submodules
      run: |
        git config --global --add safe.directory ${SCM_ROOT}
        cd ${SCM_ROOT}
        git submodule update --init --recursive

    - name: Setup Intel oneAPI.
      run: |
        source /opt/intel/oneapi/setvars.sh
      shell: bash

    - name: Setup MPI Paths
      run: |
        echo "PATH=/opt/intel/oneapi/mpi/latest/bin:${PATH}" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=/opt/intel/oneapi/mpi/latest/lib:${LD_LIBRARY_PATH}" >> $GITHUB_ENV

    - name: Dispaly stuff
      run: |
        echo "-----LD_LIBRARY_PATH-----"
        echo ${LD_LIBRARY_PATH}
        echo "----------PATH-----------"
        echo ${PATH}
        echo "---------- /opt/intel/oneapi/ ---------"
        ls /opt/intel/oneapi/
        echo "---------- /opt/intel/oneapi/compiler ---------"
        ls /opt/intel/oneapi/compiler
        echo "------ /opt/intel/oneapi/2025.3/compiler"
        ls /opt/intel/oneapi/compiler/2025.3/
        echo "----- /opt/intel/oneapi/mpi ----------"
        ls /opt/intel/oneapi/mpi/
        echo "----- /opt/intel/oneapi/mpi/latest ----------"
        ls /opt/intel/oneapi/mpi/latest	
        echo "----- /opt/intel/oneapi/mpi/latest/bin ----------"
        ls /opt/intel/oneapi/mpi/latest/bin
        echo "----- /opt/intel/oneapi/mpi/latest/lib ----------"
        ls /opt/intel/oneapi/mpi/latest/lib
        echo "----- /opt/intel/oneapi/compiler/2025.3/bin -----"
        ls /opt/intel/oneapi/compiler/2025.3/bin
        echo "----- /opt/intel/oneapi/compiler/2025.3/lib -----"
        ls /opt/intel/oneapi/compiler/2025.3/lib

    - name: Configure Build with CMake
      run: |
        cd ${SCM_ROOT}/scm
        mkdir bin && cd bin
        cmake -DCCPP_SUITES=${suites},${suites_ps} -DCMAKE_BUILD_TYPE=${{matrix.build-type}} ../src

    - name: Build SCM
      run: |
        cd ${SCM_ROOT}/scm/bin
        make -j4
